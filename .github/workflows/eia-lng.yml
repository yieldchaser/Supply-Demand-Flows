name: EIA LNG Exports (monthly)

on:
  schedule:
    - cron: '0 16 5 * *'   # Monthly on the 5th at 16:00 UTC (EIA publishes ~3-5 days in)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eia-lng
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run LNG scraper
        id: scrape
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          python -m scrapers.eia_api.lng_exports | tee /tmp/scraper_output.json
          STATUS=$(python -c "import json; print(json.load(open('/tmp/scraper_output.json'))['status'])")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "ok" ]; then
            PERIOD=$(python -c "import json; print(json.load(open('/tmp/scraper_output.json'))['latest_period'])")
            echo "latest_period=$PERIOD" >> $GITHUB_OUTPUT
          fi

      - name: Transform raw → curated
        if: steps.scrape.outputs.status == 'ok'
        run: python -m transformers.eia_lng_exports

      - name: Commit
        if: steps.scrape.outputs.status == 'ok'
        env:
          LATEST_PERIOD: ${{ steps.scrape.outputs.latest_period }}
        run: |
          git config user.name "blue-tide-bot"
          git config user.email "bot@bluetide.local"
          git add data/health/eia_lng.json || true
          git add data/curated/eia_lng_exports.parquet || true
          if ! git diff --cached --quiet; then
            git commit -m "data(lng): EIA LNG exports ${LATEST_PERIOD}"
            for i in {1..5}; do
              git pull --rebase --autostash origin main && git push origin main && break || sleep 5
            done
          fi

      - name: Report skip
        if: steps.scrape.outputs.status == 'skipped'
        run: echo "Staleness gate held — no new LNG data since last fetch"

      - name: Report failure
        if: steps.scrape.outputs.status == 'failed' || failure()
        run: |
          git config user.name "blue-tide-bot"
          git config user.email "bot@bluetide.local"
          git add data/health/eia_lng.json || true
          if ! git diff --cached --quiet; then
            git commit -m "data(lng): health update (failure recorded)"
            for i in {1..5}; do
              git pull --rebase --autostash origin main && git push origin main && break || sleep 5
            done
          fi
          exit 1
