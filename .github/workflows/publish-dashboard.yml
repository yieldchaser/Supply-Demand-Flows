name: Publish Dashboard Bundle

on:
  workflow_run:
    workflows:
      - "EIA Storage (weekly)"
      - "EIA Supply (monthly)"
      - "Baker Hughes Rig Count (weekly)"
      - "GIE AGSI+ Storage (daily)"
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-dashboard
  cancel-in-progress: true

jobs:
  build-and-commit:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # workflow_run staleness workaround:
      # GitHub Actions runs workflow_run-triggered workflows against the SHA at the
      # START of the parent workflow, not at its END. Since parent scrapers commit
      # their curated Parquet at the END of their run, a default checkout here
      # would miss that commit. `ref: main` forces a fresh pull of main's current
      # HEAD including any commits made during the parent run.
      - name: Checkout (fresh main HEAD, not parent workflow SHA)
        uses: actions/checkout@v4.2.2
        with:
          ref: main
          fetch-depth: 1

      - name: Verify curated data is present
        run: |
          echo "=== data/curated/ contents ==="
          ls -la data/curated/ || echo "(directory missing)"
          echo "=== Parquet count ==="
          find data/curated -name "*.parquet" -type f | wc -l

      - name: Uses setup-python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build dashboard bundle
        run: python -m publishers.export_dashboard_json

      - name: Commit bundle
        run: |
          git config user.name "blue-tide-bot"
          git config user.email "bot@bluetide.local"
          git add docs/data/
          if ! git diff --cached --quiet; then
            git commit -m "docs(bundle): rebuild dashboard bundle"
            for i in {1..5}; do
              git pull --rebase --autostash origin main && git push origin main && break || sleep 5
            done
          fi
