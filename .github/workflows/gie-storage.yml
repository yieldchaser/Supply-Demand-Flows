name: GIE AGSI+ Storage (daily)

on:
  schedule:
    - cron: '0 9 * * *'   # Daily 09:00 UTC (after AGSI's morning T-1 publish)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gie-storage
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run GIE scraper
        id: scrape
        env:
          GIE_API_KEY: ${{ secrets.GIE_API_KEY }}
        run: |
          python -m scrapers.gie_agsi.european_storage | tee /tmp/scraper_output.json
          STATUS=$(python -c "import json; print(json.load(open('/tmp/scraper_output.json'))['status'])")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "ok" ]; then
            GAS_DAY=$(python -c "import json; print(json.load(open('/tmp/scraper_output.json'))['latest_gas_day'])")
            echo "gas_day=$GAS_DAY" >> $GITHUB_OUTPUT
          fi

      - name: Transform raw → curated
        if: steps.scrape.outputs.status == 'ok'
        run: python -m transformers.gie_agsi

      - name: Commit
        if: steps.scrape.outputs.status == 'ok'
        env:
          GAS_DAY: ${{ steps.scrape.outputs.gas_day }}
        run: |
          git config user.name "blue-tide-bot"
          git config user.email "bot@bluetide.local"
          git add data/health/gie_agsi.json || true
          git add data/curated/gie_agsi.parquet || true
          if ! git diff --cached --quiet; then
            git commit -m "data(gie): European storage ${GAS_DAY}"
            for i in {1..5}; do
              git pull --rebase --autostash origin main && git push origin main && break || sleep 5
            done
          fi

      - name: Report skip
        if: steps.scrape.outputs.status == 'skipped'
        run: echo "Staleness gate held — no new data since last fetch"

      - name: Report failure
        if: steps.scrape.outputs.status == 'failed' || failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "blue-tide-bot"
          git config user.email "bot@bluetide.local"
          git add data/health/gie_agsi.json || true
          if ! git diff --cached --quiet; then
            git commit -m "data(gie): health update (failure recorded)"
            for i in {1..5}; do
              git pull --rebase --autostash origin main && git push origin main && break || sleep 5
            done
          fi
          exit 1
