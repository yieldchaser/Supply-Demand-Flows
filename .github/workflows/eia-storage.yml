name: EIA Storage (weekly)

on:
  schedule:
    # Thursday 15:00 UTC (primary window — EIA publishes ~14:30 UTC)
    - cron: '0 15 * * 4'
    # Friday 03:00 UTC (retry for late Thursday releases)
    - cron: '0 3 * * 5'
    # Saturday 15:00 UTC (holiday delay catch)
    - cron: '0 15 * * 6'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: eia-storage
  cancel-in-progress: true

jobs:
  fetch:
    name: Fetch and commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run EIA storage scraper
        id: scrape
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
        run: |
          python -m scrapers.eia_api.storage | tee /tmp/scraper_output.json
          # Extract status for conditional commit step
          STATUS=$(python -c "import json; print(json.load(open('/tmp/scraper_output.json'))['status'])")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "ok" ]; then
            LATEST=$(python -c "import json; print(json.load(open('/tmp/scraper_output.json'))['latest_date'])")
            echo "latest_date=$LATEST" >> $GITHUB_OUTPUT
          fi

      - name: Transform raw → curated
        if: steps.scrape.outputs.status == 'ok'
        run: |
          python -c "
          from pathlib import Path
          import json
          from transformers.eia_storage import transform
          latest = sorted(Path('data/raw/eia_storage').rglob('*.json'))[-1]
          out = Path('data/curated/eia_storage.parquet')
          out.parent.mkdir(parents=True, exist_ok=True)
          result = transform(latest, out)
          print(json.dumps(result, indent=2, default=str))
          "

      - name: Commit new data
        if: steps.scrape.outputs.status == 'ok'
        env:
          LATEST: ${{ steps.scrape.outputs.latest_date }}
        run: |
          git config user.name "blue-tide-bot"
          git config user.email "bot@bluetide.local"
          git add data/health/eia_storage.json
          git add data/curated/eia_storage.parquet || true
          if ! git diff --cached --quiet; then
            git commit -m "data(storage): EIA ${LATEST}"
            for i in {1..5}; do
              git pull --rebase --autostash origin main && git push origin main && break || sleep 5
            done
          fi

      - name: Report skip
        if: steps.scrape.outputs.status == 'skipped'
        run: echo "Staleness gate held — no new data since last fetch"

      - name: Report failure
        if: steps.scrape.outputs.status == 'failed' || failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Scraper failed — health file will show details"
          git config user.name "blue-tide-bot"
          git config user.email "bot@bluetide.local"
          git add data/health/eia_storage.json || true
          if ! git diff --cached --quiet; then
            git commit -m "data(storage): health update (failure recorded)"
            for i in {1..5}; do
              git pull --rebase --autostash origin main && git push origin main && break || sleep 5
            done
          fi
          exit 1
