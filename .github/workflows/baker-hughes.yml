name: Baker Hughes Rig Count (weekly)

on:
  schedule:
    - cron: '0 19 * * 5'  # Friday 19:00 UTC (1h after publish, ensures file is live)
    - cron: '0 19 * * 6'  # Saturday retry
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: baker-hughes
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Baker Hughes scraper
        id: scrape
        run: |
          python -m scrapers.baker_hughes.rigs | tee /tmp/scraper_output.json
          STATUS=$(python -c "import json; print(json.load(open('/tmp/scraper_output.json'))['status'])")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "ok" ]; then
            DATE=$(python -c "import json; print(json.load(open('/tmp/scraper_output.json'))['date'])")
            echo "date=$DATE" >> $GITHUB_OUTPUT
          fi

      - name: Transform raw → curated
        if: steps.scrape.outputs.status == 'ok'
        run: |
          python -c "
          from pathlib import Path
          import json
          from transformers.baker_hughes import transform
          latest = sorted(Path('data/raw/baker_hughes').rglob('*.xlsx'))[-1]
          out = Path('data/curated/baker_hughes_weekly.parquet')
          out.parent.mkdir(parents=True, exist_ok=True)
          result = transform(latest, out)
          print(json.dumps(result, indent=2, default=str))
          "

      - name: Commit
        if: steps.scrape.outputs.status == 'ok'
        env:
          DATE: ${{ steps.scrape.outputs.date }}
        run: |
          git config user.name "blue-tide-bot"
          git config user.email "bot@bluetide.local"
          git add data/health/baker_hughes_rigs.json
          git add data/curated/baker_hughes_weekly.parquet || true
          if ! git diff --cached --quiet; then
            git commit -m "data(rigs): Baker Hughes ${DATE}"
            for i in {1..5}; do
              git pull --rebase --autostash origin main && git push origin main && break || sleep 5
            done
          fi

      - name: Report skip
        if: steps.scrape.outputs.status == 'skipped'
        run: echo "Staleness gate held — no new data since last fetch"

      - name: Report failure
        if: steps.scrape.outputs.status == 'failed' || failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "blue-tide-bot"
          git config user.email "bot@bluetide.local"
          git add data/health/baker_hughes_rigs.json || true
          if ! git diff --cached --quiet; then
            git commit -m "data(rigs): health update (failure recorded)"
            for i in {1..5}; do
              git pull --rebase --autostash origin main && git push origin main && break || sleep 5
            done
          fi
          exit 1
